name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.suffix }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: amd64
            suffix: darwin-amd64
          - goos: darwin
            goarch: arm64
            suffix: darwin-arm64
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
          - goos: windows
            goarch: amd64
            suffix: windows-amd64
            ext: .exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          VERSION="${GITHUB_REF_NAME}"
          BINARY="termf1${{ matrix.ext }}"
          go build \
            -ldflags="-s -w -X main.version=${VERSION}" \
            -o "${BINARY}" .

      - name: Package archive
        id: archive
        run: |
          VERSION="${GITHUB_REF_NAME}"
          BINARY="termf1${{ matrix.ext }}"
          ARCHIVE="termf1-${VERSION}-${{ matrix.suffix }}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip "${ARCHIVE}.zip" "${BINARY}" README.md .env.example
            echo "asset=${ARCHIVE}.zip" >> "$GITHUB_OUTPUT"
          else
            tar czf "${ARCHIVE}.tar.gz" "${BINARY}" README.md .env.example
            echo "asset=${ARCHIVE}.tar.gz" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.archive.outputs.asset }}
          generate_release_notes: true
