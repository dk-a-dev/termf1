name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: false

  build:
    name: Build ${{ matrix.suffix }}
    needs: create-release
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: amd64
            suffix: darwin-amd64
          - goos: darwin
            goarch: arm64
            suffix: darwin-arm64
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
          - goos: windows
            goarch: amd64
            suffix: windows-amd64
            ext: .exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          go build \
            -ldflags="-s -w -X main.version=${GITHUB_REF_NAME}" \
            -o "termf1${{ matrix.ext }}" .

      - name: Package archive
        id: archive
        run: |
          ARCHIVE="termf1-${GITHUB_REF_NAME}-${{ matrix.suffix }}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip "${ARCHIVE}.zip" "termf1${{ matrix.ext }}" README.md .env.example
            echo "asset=${ARCHIVE}.zip" >> "$GITHUB_OUTPUT"
          else
            tar czf "${ARCHIVE}.tar.gz" "termf1${{ matrix.ext }}" README.md .env.example
            echo "asset=${ARCHIVE}.tar.gz" >> "$GITHUB_OUTPUT"
          fi

      - name: Store artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.archive.outputs.asset }}
          path: ${{ steps.archive.outputs.asset }}

  upload:
    name: Upload release assets
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Upload all assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: false
